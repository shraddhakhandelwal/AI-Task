kind = "web"
previewPath = "/"
title = "Solar Load Calculator"
version = "1.0.0"
id = "artifacts/solar-calculator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24367

[services.development]
run = "pnpm --filter @workspace/solar-calculator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/solar-calculator", "run", "build" ]
publicDir = "artifacts/solar-calculator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24367"
BASE_PATH = "/"
